<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisal Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>REVISAL</h2>
            </div>
            <nav>
                <ul>
                    <li class="active"><i class='bx bxs-home'></i> Home</li>
                    <li><i class='bx bxs-folder'></i> Project</li>
                    <li><i class='bx bxs-calendar'></i> Calendar</li>
                    <li class="dropdown">
                        <span><i class='bx bxs-chat'></i> Communicate <span class="badge">3</span></span>
                        <i class='bx bx-chevron-down'></i>
                    </li>
                    <li><i class='bx bxs-briefcase'></i> Services</li>
                    <li><i class='bx bxs-bell'></i> Notifications</li>
                    <li><i class='bx bxs-cog'></i> Settings</li>
                    <li><i class='bx bxs-help-circle'></i> Help</li>
                </ul>
            </nav>
            <div class="user-profile">
                <div class="avatar"></div>
                <span>Sally Nguyen</span>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="welcome">
                    <h1>Hello, Human</h1>
                    <p>Let's start the day</p>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                </div>
            </header>

            <section class="stat-cards">
                <div class="card mini-card">
                    <p>Unread Message</p>
                    <h2>3</h2>
                </div>
                <div class="card mini-card">
                    <p>Ongoing Projects</p>
                    <h2>2</h2>
                </div>
                <div class="card mini-card">
                    <p>Today Tasks</p>
                    <h2>4</h2>
                </div>
            </section>

            <section class="action-buttons">
                <button class="btn-outline"><i class='bx bx-plus-circle'></i> Add Project</button>
                <button class="btn-outline"><i class='bx bx-plus-circle'></i> Create Task</button>
                <button class="btn-outline"><i class='bx bx-plus-circle'></i> Add Meeting</button>
            </section>

            <div class="content-grid">
                <div class="left-col">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>Recent Project Overview</h3>
                            <button class="btn-small">View All Projects</button>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th><input type="checkbox"></th>
                                    <th>Project</th>
                                    <th>Stage</th>
                                    <th>Process</th>
                                    <th>End Date</th>
                                </tr>
                            </thead>
                            <tbody id="project-list">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="right-col">
                    <div class="card list-card">
                        <div class="table-header">
                            <h3>To-Do List</h3>
                            <button class="btn-small">Add more</button>
                        </div>
                        <ul id="todo-list"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
